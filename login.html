<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
 
  <div class="font-sans bg-[url(logo2.png)] bg-contain">
    <div class="relative min-h-screen  flex flex-col sm:justify-center   "><!--  bg-black -->
        <div class="relative sm:max-w-sm m-60"> <!--  relative sm:max-w-sm w-full  -->
            <div class="card bg-orange-500 shadow-lg  w-full h-full rounded-3xl absolute  transform -rotate-6"></div>
            <div class="card bg-sky-200 shadow-lg  w-full h-full rounded-3xl absolute  transform rotate-6"></div>
            <div class="relative w-full rounded-3xl  px-6 py-4 bg-gray-100 shadow-md">
              
                <label for="" class="block mt-3 text-sm text-gray-700 text-center font-semibold">
                    Log In
                </label>
                <form method="#" action="#" class="mt-10">

                    <div>
                        <input type="text" placeholder="Email" class="mt-1 block w-full border-none bg-gray-100 h-11 rounded-xl shadow-lg hover:bg-blue-100 focus:bg-blue-100 focus:ring-0">
                    </div>

                    <div>
                      <input type="password" placeholder="Contraseña" class="mt-1 block w-full border-none bg-gray-100 h-11 rounded-xl shadow-lg hover:bg-blue-100 focus:bg-blue-100 focus:ring-0">
                    </div>
        
                    <div class="mt-7">
                        <button class="bg-blue-500 w-full py-3 rounded-xl text-white shadow-xl hover:shadow-inner focus:outline-none transition duration-500 ease-in-out  transform hover:-translate-x hover:scale-105">
                            Log in
                        </button>
                    </div>
                </form>
            </div>

        </div>
    </div>
  </div>
  
</body>
</html>
